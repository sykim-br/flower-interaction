<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>손으로 피우는 꽃</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      margin: 0;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    #stage {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }

    #flowerVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    #camWrap {
      position: absolute;
      bottom: 12px;
      right: 12px;
      width: 140px;
      height: 105px;
      border-radius: 10px;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.2);
      background: #000;
    }

    #webcam {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    #landmarkCanvas {
      position: absolute;
      bottom: 12px;
      right: 12px;
      width: 140px;
      height: 105px;
      border-radius: 10px;
      pointer-events: none;
    }

    #overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-radius: 18px;
      transition: box-shadow 0.4s;
    }

    .bloom-glow {
      box-shadow: inset 0 0 60px 20px rgba(255, 180, 100, 0.25);
    }

    .wilt-glow {
      box-shadow: inset 0 0 60px 20px rgba(60, 0, 80, 0.35);
    }

    #loadingMsg {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.75);
      border-radius: 18px;
      font-size: 0.9rem;
      color: #ccc;
      gap: 10px;
      z-index: 10;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #555;
      border-top-color: #f090b0;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

  </style>
</head>
<body>
  <div id="stage">
    <video id="flowerVideo" muted playsinline preload="auto"></video>
    <div id="overlay"></div>
    <div id="camWrap">
      <video id="webcam" autoplay muted playsinline></video>
    </div>
    <canvas id="landmarkCanvas"></canvas>
    <div id="loadingMsg">
      <div class="spinner"></div>
      <span>손 인식 모델 불러오는 중...</span>
    </div>
  </div>

  <span id="gestureIcon" style="display:none"></span>
  <span id="gestureText" style="display:none"></span>
  <p id="debug" style="display:none"></p>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <script>
    const flowerVideo  = document.getElementById('flowerVideo');
    const webcamEl     = document.getElementById('webcam');
    const canvas       = document.getElementById('landmarkCanvas');
    const ctx          = canvas.getContext('2d');
    const overlay      = document.getElementById('overlay');
    const gestureIcon  = document.getElementById('gestureIcon');
    const gestureText  = document.getElementById('gestureText');
    const loadingMsg   = document.getElementById('loadingMsg');

    flowerVideo.src  = '꽃영상_2.mp4';
    flowerVideo.loop = false;

    let videoDuration = 0;
    flowerVideo.addEventListener('loadedmetadata', () => {
      videoDuration = flowerVideo.duration;
      flowerVideo.currentTime = 0;
      flowerVideo.pause();
    });

    // ── 손 펼침 정도 → 영상 위치 실시간 매핑 ─────────────────
    const debugEl = document.getElementById('debug');

    function dist(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    // tip이 mcp보다 손목에서 멀면 펼쳐진 손가락
    function countOpenFingers(lm) {
      const w = lm[0];
      const pairs = [[8,5],[12,9],[16,13],[20,17]];
      let n = 0;
      for (const [tip, mcp] of pairs) {
        if (dist(lm[tip], w) > dist(lm[mcp], w) * 1.1) n++;
      }
      return n;
    }

    // ── 제스처 상태 ────────────────────────────────────────────
    let gesture = null;  // 'open' | 'fist' | null  (확정값)
    let pending = null;
    let pendCnt = 0;
    const NEED  = 4;     // 연속 N프레임이어야 확정

    // ── 역방향 스크럽 루프 ─────────────────────────────────────
    let reversing = false;
    const REV_SPEED = 0.06;

    function reverseLoop() {
      if (!reversing) return;
      const t = flowerVideo.currentTime;
      if (t > 0.02) {
        flowerVideo.currentTime = Math.max(t - REV_SPEED, 0);
        requestAnimationFrame(reverseLoop);
      } else {
        flowerVideo.currentTime = 0;
        flowerVideo.pause();
        reversing = false;
      }
    }

    function startReverse() {
      flowerVideo.pause();
      if (!reversing) {
        reversing = true;
        requestAnimationFrame(reverseLoop);
      }
    }

    function startForward() {
      reversing = false;
      flowerVideo.play().catch(() => {});
    }

    function stopAll() {
      reversing = false;
      flowerVideo.pause();
    }

    // 끝까지 재생되면 정지
    flowerVideo.addEventListener('ended', () => { stopAll(); });

    // ── 제스처 확정 시 실행 ────────────────────────────────────
    function commitGesture(next) {
      if (next === gesture) return;
      const prev = gesture;
      gesture = next;

      if (next === null) return; // 손 잠깐 사라짐 — 재생 상태 유지

      if (next === 'open') {
        if (prev === 'fist') {
          startForward();
          gestureIcon.textContent = '🖐';
          gestureText.textContent = '꽃이 피어나고 있어요 🌸';
          overlay.className = 'bloom-glow';
        } else {
          stopAll();
          const dur = flowerVideo.duration;
          flowerVideo.currentTime = isNaN(dur) ? 3 : dur;
          gestureIcon.textContent = '🖐';
          gestureText.textContent = '꽃이 활짝 피었어요 🌸';
          overlay.className = 'bloom-glow';
        }
      } else { // fist
        if (prev === 'open') {
          startReverse();
          gestureIcon.textContent = '✊';
          gestureText.textContent = '꽃이 지고 있어요 🍂';
          overlay.className = 'wilt-glow';
        } else {
          stopAll();
          flowerVideo.currentTime = 0;
          gestureIcon.textContent = '✊';
          gestureText.textContent = '꽃봉오리 상태예요';
          overlay.className = '';
        }
      }
    }

    function setGesture(lm) {
      if (!lm) {
        debugEl.textContent = 'open fingers: -';
        if (pending !== null) { pending = null; pendCnt = 0; }
        // 손 사라지면 null 확정 (잠깐이면 유지)
        commitGesture(null);
        return;
      }
      const n   = countOpenFingers(lm);
      const raw = n >= 3 ? 'open' : n <= 1 ? 'fist' : null;
      debugEl.textContent = 'open fingers: ' + n;

      if (raw === pending) {
        pendCnt++;
        if (pendCnt >= NEED && raw !== null) commitGesture(raw);
      } else {
        pending = raw;
        pendCnt = 1;
      }
    }

    // ── MediaPipe Hands ────────────────────────────────────────
    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.75,
      minTrackingConfidence: 0.65,
    });

    function onResults(results) {
      ctx.save();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.translate(canvas.width, 0);
      ctx.scale(-1, 1);

      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        for (const lm of results.multiHandLandmarks) {
          drawConnectors(ctx, lm, HAND_CONNECTIONS, { color: '#ff99cc', lineWidth: 1.5 });
          drawLandmarks(ctx, lm, { color: '#ffffff', lineWidth: 1, radius: 2 });
        }
        setGesture(results.multiHandLandmarks[0]);
      } else {
        setGesture(null);
      }
      ctx.restore();
    }

    hands.onResults(onResults);

    // ── 웹캠 시작 ─────────────────────────────────────────────
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { width: 320, height: 240, facingMode: 'user' },
          audio: false
        });
        webcamEl.srcObject = stream;

        webcamEl.onloadedmetadata = () => {
          canvas.width  = webcamEl.offsetWidth  || 140;
          canvas.height = webcamEl.offsetHeight || 105;
        };

        const camera = new Camera(webcamEl, {
          onFrame: async () => {
            await hands.send({ image: webcamEl });
            loadingMsg.style.display = 'none';
          },
          width: 320,
          height: 240,
        });

        await camera.start();
        gestureText.textContent = '손을 카메라에 보여주세요';

      } catch (err) {
        loadingMsg.innerHTML = `<span style="color:#f88">웹캠 접근 실패: ${err.message}</span>`;
      }
    }

    startCamera();
  </script>
</body>
</html>
